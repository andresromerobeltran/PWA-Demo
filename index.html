<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Configuración del documento -->
    <meta charset="UTF-8">
    <meta name="author" content="Andrés Romero Beltrán">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <title>PWA Demo</title>

    <!-- Descripción -->
    <meta name="description"
        content="Aplicación desarrollada como parte de la conceptualización acerca de la conversión de una aplicación web en una Progressive Web App (PWA).">

    <!-- Color del navegador -->
    <meta name="theme-color" content="#1565C0">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

</head>

<body>

    <!-- ==========================
         ENCABEZADO
    =========================== -->

    <header>

        <h1>PWA Demo</h1>

        <p>
            Aprendizaje y conceptualización acerca del funcionamiento de una Progressive Web App mediante un ejemplo práctico.
        </p>

    </header>

    <!-- ==========================
         CONTENIDO PRINCIPAL
    =========================== -->

    <main>

        <!-- ======================
             FORMULARIO
        ======================= -->

        <section class="task-form">

            <h2>Nueva tarea</h2>

            <form id="taskForm">

                <label for="taskInput">

                    Escriba una tarea

                </label>

                <input
                    type="text"
                    id="taskInput"
                    placeholder="Ejemplo: Aprender Service Workers"
                    aria-label="Nueva tarea"
                    required>

                <button type="submit">

                    Agregar tarea

                </button>

            </form>

        </section>

        <!-- ======================
             LISTA DE TAREAS
        ======================= -->

        <section class="task-list">

            <h2>Mis tareas</h2>

            <ul id="taskList">

                <!--
                    JavaScript agregará aquí
                    las tareas dinámicamente.
                -->

            </ul>

        </section>

        <!-- ======================
             CONTADOR
        ======================= -->

        <section class="task-counter">

            <p>

                Total de tareas:

                <span id="taskCount">

                    0

                </span>

            </p>

        </section>

    </main>

    <!-- ==========================
         PIE DE PÁGINA
    =========================== -->

    <footer>

        <p>

            PWA Learn · Versión 1.0

        </p>

    </footer>

    <!-- JavaScript -->

    <script src="js/app.js" defer></script>

</body>

</html>
